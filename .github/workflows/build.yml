name: BE3600-TurboACC
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison git python3 unzip libssl-dev libelf-dev

      - name: Clone OpenWrt 23.05 (标准)
        run: |
          git clone --depth=1 --branch=openwrt-23.05 https://git.openwrt.org/openwrt/openwrt.git openwrt
          cd openwrt

      - name: Add feeds & update
        run: |
          cd openwrt
          echo "src-git full https://git.openwrt.org/feed/packages.git;openwrt-23.05" > feeds.conf
          echo "src-git luci https://git.openwrt.org/feed/luci.git;openwrt-23.05" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add TurboACC
        run: |
          cd openwrt
          curl -sSL https://raw.githubusercontent.com/chenmozhijin/turboacc/luci/add_turboacc.sh -o add_turboacc.sh
          chmod +x add_turboacc.sh
          ./add_turboacc.sh --no-sfe

      - name: Config for BE3600 (IPQ5312)
        run: |
          cd openwrt
          cat > .config <<EOF
CONFIG_TARGET_ipq53xx=y
CONFIG_TARGET_ipq53xx_ipq5312=y
CONFIG_TARGET_PROFILE_glinet_gl_be3600=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_kmod-shortcut-fe=n
EOF
          make defconfig

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BE3600-TurboACC
          path: openwrt/bin/targets/ipq53xx/ipq5312/*.bin
