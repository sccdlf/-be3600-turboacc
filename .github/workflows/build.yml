name: Build BE3600 TurboACC
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison git python3 python3-pip unzip libssl-dev libelf-dev file

      - name: Clone GL.iNet SDK
        run: |
          git clone --depth 1 https://github.com/gl-inet/sdk.git openwrt
          cd openwrt
          ./download.sh ipq53xx

      - name: Install TurboACC
        run: |
          cd openwrt
          curl -sSL https://raw.githubusercontent.com/chenmozhijin/turboacc/luci/add_turboacc.sh -o add_turboacc.sh
          chmod +x add_turboacc.sh
          ./add_turboacc.sh --no-sfe

      - name: Write config
        run: |
          cd openwrt
          cat > .config << EOF
CONFIG_TARGET_ipq53xx=y
CONFIG_TARGET_ipq53xx_ipq5312=y
CONFIG_TARGET_PROFILE_glinet_gl_be3600=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_kmod-shortcut-fe=n
CONFIG_PACKAGE_kmod-shortcut-fe-cm=n
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y
EOF
          make defconfig

      - name: Compile
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: BE3600-TurboACC-Firmware
          path: openwrt/bin/targets/ipq53xx/ipq5312/*.bin
